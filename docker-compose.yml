services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - SPAN_STORAGE_TYPE=memory
      - COLLECTOR_OTLP_ENABLED=true
      - memory.max-traces=50000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:16686"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - otel-network

  hivemq:
    image: hivemq/hivemq4:4.29.0
    container_name: hivemq
    ports:
      - "1883:1883"
      - "8083:8080"
    volumes:
      - ./config/hivemq:/opt/hivemq/conf
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/1883' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - otel-network

  seq:
    image: datalust/seq:latest
    container_name: seq
    ports:
      - "8081:80"
      - "5341:5341"
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    restart: unless-stopped
    networks:
      - otel-network

  telemetry-api:
    build:
      context: .
      dockerfile: src/TelemetryApi/Dockerfile
    container_name: telemetry-api
    ports:
      - "5001:8080"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - LiteDb__ConnectionString=/app/data/telemetry.db
      - Seq__ServerUrl=http://seq:5341
    volumes:
      - telemetry-data:/app/data
    depends_on:
      hivemq:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - otel-network

  machine-simulator:
    build:
      context: .
      dockerfile: src/MachineSimulator/Dockerfile
    container_name: machine-simulator
    environment:
      - Mqtt__Host=hivemq
      - Mqtt__PublishIntervalSeconds=5
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - Seq__ServerUrl=http://seq:5341
    depends_on:
      jaeger:
        condition: service_healthy
      hivemq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - otel-network

  orchestrator:
    build:
      context: .
      dockerfile: src/Orchestrator/Dockerfile
    container_name: orchestrator
    environment:
      - Mqtt__Host=hivemq
      - Api__BaseUrl=http://telemetry-api:8080
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - Seq__ServerUrl=http://seq:5341
    depends_on:
      jaeger:
        condition: service_healthy
      hivemq:
        condition: service_healthy
      telemetry-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - otel-network

networks:
  otel-network:
    driver: bridge

volumes:
  telemetry-data:
